<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survey</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="jspsych/jspsych.css" rel="stylesheet" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background-color: #f5f7fb;
      margin: 0;
    }

    .instructions-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 850px;
      margin: 20px auto;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.08);
      font-size: 16px;
      line-height: 1.6;
    }

    /* PROFILE + BUTTON WRAPPER */
    .profile-wrapper {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 20px;
    }

    .profile-column {
      flex: 1;
      text-align: center;
    }

    .profile-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      border: 1px solid #e6e9ef;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.08);
      font-size: 15px;
    }

    .profile-card ul {
      list-style: none;
      padding: 0;
      margin: 0;
      text-align: left;
    }

    .profile-card li {
      margin-bottom: 6px;
    }

    /* BUTTON BELOW EACH PROFILE */
    .choice-btn {
      margin-top: 15px;
      width: 100%;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    .choice-btn:hover {
      background: #3a5ae0;
    }

    /* DEFAULT jsPsych buttons (hide them) */
    .jspsych-btn {
      display: none;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .profile-wrapper {
        gap: 10px;
      }

      .profile-card {
        font-size: 14px;
        padding: 12px;
      }

      .choice-btn {
        font-size: 16px;
        padding: 12px;
      }

      .instructions-box {
        margin: 10px;
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

<script src="jspsych/jspsych.js"></script>
<script src="jspsych/plugin-html-button-response.js"></script>
<script src="jspsych/plugin-instructions.js"></script>
<script src="jspsych/plugin-survey-html-form.js"></script>

<script src="experiment.js"></script>

</body>
</html>
