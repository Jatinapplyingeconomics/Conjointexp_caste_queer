<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survey</title>

  <!-- Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- jsPsych CSS -->
  <link href="jspsych/jspsych.css" rel="stylesheet" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background-color: #f5f7fb;
      margin: 0;
    }

    /* Main container */
    .instructions-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 850px;
      margin: 30px auto;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.08);
      font-size: 16px;
      line-height: 1.6;
    }

    h2, h3 {
      margin-top: 0;
    }

    /* Profiles */
    .profile-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .profile-card {
      flex: 1;
      background: #ffffff;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0px 2px 10px rgba(0,0,0,0.08);
      border: 1px solid #e6e9ef;
    }

    .profile-card h3 {
      margin-bottom: 10px;
    }

    .profile-card ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .profile-card li {
      margin-bottom: 8px;
      font-size: 15px;
    }

    /* Buttons */
    .jspsych-btn {
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 16px !important;
      margin: 10px !important;
      cursor: pointer;
    }

    .jspsych-btn:hover {
      background: #3a5ae0;
    }

    /* Secondary button (for "I do not agree") */
    .jspsych-btn:nth-child(1) {
      background: #e5e7eb;
      color: #111;
    }

    .jspsych-btn:nth-child(1):hover {
      background: #d1d5db;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 4px;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4a6cf7;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .profile-container {
        flex-direction: column;
      }

      .instructions-box {
        margin: 15px;
        padding: 20px;
        font-size: 17px;
      }

      .profile-card {
        font-size: 16px;
      }

      .jspsych-btn {
        width: 100% !important;
        font-size: 18px !important;
        padding: 14px !important;
      }
    }
  </style>
</head>

<body>

<!-- jsPsych core -->
<script src="jspsych/jspsych.js"></script>

<!-- plugins -->
<script src="jspsych/plugin-html-button-response.js"></script>
<script src="jspsych/plugin-instructions.js"></script>
<script src="jspsych/plugin-survey-html-form.js"></script>

<!-- experiment -->
<script src="experiment.js"></script>

</body>
</html>
